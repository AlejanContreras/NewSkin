            <div class="logo">👕 NewSkin</div>
            <div class="right-menu">
                <div class="login" onclick="iniciarSesion()">Iniciar sesión</div>
                <div class="carrito" onclick="abrirCarrito()">🛒 Carrito (0)</div>
