<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Carrito - NewSkin</title>
    <link rel="stylesheet" href="/Pruebas/css/P_login.css">
    <link rel="stylesheet" href="/Pruebas/css/P_registrarse.css">
    <link rel="stylesheet" href="/Pruebas/css/P_inicarSesion.css">
    <link rel="stylesheet" href="/Pruebas/css/P_usuario.css">
    <link rel="stylesheet" href="/Pruebas/css/P_toast_login.css">
    <link rel="stylesheet" href="/Pruebas/css/P_carrito_CARRITO.css">
    <link rel="stylesheet" href="/Pruebas/css/P_productos_CARRITO.css">
    <!--<link rel="stylesheet" href="/Pruebas/css/P_historial_CARRITO.css">-->
</head>

<body>
    <header class="header">
        <div class="header-left">
            <span id="btnProductos" class="activo">Productos </span>
            <span> - </span>
            <span id="btnHistorial"> Historial</span>
        </div>

        <div class="logo" onclick="window.location.href='/Pruebas/html/PruebasOficial.html';">
            👕 <span>NewSkin</span>
        </div>

        <div class="header-right">
            <div class="login loginBtn"></div>
            <span>🛒 Carrito (2)</span>
        </div>
    </header>
    <main>

        <div class="breadcrumb">Inicio / Carrito</div>

        <h1>Carrito de Compras</h1>

        <div class="carrito-box">

            <!-- ENCABEZADO -->
            <div class="carrito-header">
                <span>Producto</span>
                <span>Precio</span>
                <span>Cantidad</span>
                <span>Subtotal</span>
            </div>

            <!-- PRODUCTO -->
            <div class="producto">

                <div class="info">

                    <!-- EDITAR -->
                    <div class="editar">
                        ✏️
                    </div>

                    <img src="https://via.placeholder.com/80" alt="">

                    <div>
                        <h3>Modelo 1</h3>
                        <p>Talla: M</p>
                        <small>Algodón premium, estilo urbano</small>
                    </div>
                </div>

                <div class="precio">$45.000</div>

                <div class="cantidad">
                    <button>-</button>
                    <span>1</span>
                    <button>+</button>
                </div>

                <div class="subtotal">

                    <span>$45.000</span>

                    <!-- ELIMINAR -->
                    <div class="eliminar">
                        🗑️
                    </div>

                </div>

            </div>

            <!-- TOTAL -->
            <div class="total">
                <span>Total:</span>
                <strong>$135.000</strong>
            </div>

        </div>

        <!-- BOTONES -->
        <div class="acciones">
            <button class="seguir">Seguir comprando</button>
            <button class="finalizar">Finalizar compra</button>
        </div>
        

    </main>

    <footer>
        <div class="footer-content">
            <div>
                <p><b>NewSkin © 2026</b></p>
                <p>Soacha - Bogotá</p>
                <p>WhatsApp: 3XX XXX XXXX</p>
            </div>
            <div>
                <span onclick="abrirInstagram()" class="social">Instagram</span> |
                <span onclick="abrirTikTok()" class="social">TikTok</span> |
                <span onclick="abrirFacebook()" class="social">Facebook</span>
            </div>
        </div>
    </footer>

</body>
<script src="/Pruebas/js/P_respuestasBotones.js"></script>
<script src="/Pruebas/js/P_login.js"></script>
<script src="/Pruebas/js/P_registrarse.js"></script>
<script src="/Pruebas/js/P_iniciarSesion.js"></script>
<script src="/Pruebas/js/P_usuario_INDEX.js"></script>
<script src="/Pruebas/js/P_toast_login.js"></script>

</html>
