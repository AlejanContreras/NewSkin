<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NewSkin COPIAR PRUEBA</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{background:#f5f5f5}

/* HEADER */
header{
background:white;
padding:20px 40px;
border:1px solid #ccc;
}

.nav{
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:28px;
font-weight:bold;
}

/* PRODUCTOS */

.productos{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:30px;
padding:40px;
}

.card{
background:white;
border:1px solid #ccc;
padding:20px;
}

.imagen{
height:180px;
border:1px solid #aaa;
display:flex;
justify-content:center;
align-items:center;
margin-bottom:10px;
}

.btn{
width:100%;
padding:10px;
background:#444;
color:white;
border:none;
cursor:pointer;
}

/* MODAL */

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
justify-content:center;
align-items:center;
}

.modal-box{
background:white;
width:900px;
padding:25px;
display:flex;
gap:30px;
border-radius:10px;
position:relative;
}

.cerrar{
position:absolute;
right:20px;
top:10px;
font-size:22px;
cursor:pointer;
}

.img-section{width:45%}
.info{width:55%}

.img-principal{
width:100%;
border:1px solid #ccc;
}

.miniaturas{
display:flex;
gap:10px;
margin-top:10px;
}

.miniaturas img{
width:70px;
cursor:pointer;
border:1px solid #aaa;
}

.tallas button{
padding:8px 15px;
cursor:pointer;
}

.activa{
background:#444;
color:white;
}

.cantidad{
display:flex;
align-items:center;
gap:10px;
margin:15px 0;
}

.cantidad button{
width:35px;
height:35px;
cursor:pointer;
}

.precio{
margin-left:auto;
font-size:22px;
font-weight:bold;
}

.acciones{
display:flex;
gap:10px;
}

.comprar,
.carrito-btn{
flex:1;
padding:12px;
cursor:pointer;
}

.comprar{
background:#444;
color:white;
border:none;
}

.carrito-btn{
border:1px solid #444;
background:white;
}

</style>
</head>

<body>

<header>
<div class="nav">
<div>catálogo</div>
<div class="logo">👕 NewSkin</div>
<div>🛒 Carrito (0)</div>
</div>
</header>

<main>

<div class="productos">

<div class="card">
<div class="imagen">Imagen</div>
<h3>Modelo 1</h3>
<p>$45.000</p>
<button class="btn"
onclick="abrirModal('modelo1')">Ver detalles</button>
</div>

<div class="card">
<div class="imagen">Imagen</div>
<h3>Modelo 2</h3>
<p>$50.000</p>
<button class="btn"
onclick="abrirModal('modelo2')">Ver detalles</button>
</div>

<div class="card">
<div class="imagen">Imagen</div>
<h3>Modelo 3</h3>
<p>$55.000</p>
<button class="btn"
onclick="abrirModal('modelo3')">Ver detalles</button>
</div>

<div class="card">
<div class="imagen">Imagen</div>
<h3>Modelo 4</h3>
<p>$60.000</p>
<button class="btn"
onclick="abrirModal('modelo4')">Ver detalles</button>
</div>

</div>

</main>

<!-- MODAL -->

<div id="modalProducto" class="modal">

<div class="modal-box">

<span class="cerrar" onclick="cerrarModal()">✖</span>

<div class="img-section">

<img id="imagenPrincipal"
class="img-principal">

<div class="miniaturas">
<img id="img1" onclick="cambiarImagen(this.src)">
<img id="img2" onclick="cambiarImagen(this.src)">
<img id="img3" onclick="cambiarImagen(this.src)">
</div>

</div>

<div class="info">

<h2 id="titulo"></h2>
<p id="descripcion"></p>

<h4>Talla</h4>

<div class="tallas">
<button>S</button>
<button class="activa">M</button>
<button>L</button>
</div>

<div class="cantidad">
<button onclick="restar()">-</button>
<span id="cantidad">1</span>
<button onclick="sumar()">+</button>

<div class="precio" id="precio">$45.000</div>
</div>

<div class="acciones">
<button class="comprar" onclick="comprar()">Comprar ahora</button>
<button class="carrito-btn" onclick="agregar()">🛒 Agregar</button>
</div>

</div>
</div>
</div>

<script>

/* ===== BASE PRODUCTOS ===== */

const productos={
modelo1:{
nombre:"Modelo 1",
precio:45000,
descripcion:"Camiseta urbana algodón premium.",
imgs:[
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png"
]
},
modelo2:{
nombre:"Modelo 2",
precio:50000,
descripcion:"Diseño streetwear moderno.",
imgs:[
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png"
]
},
modelo3:{
nombre:"Modelo 3",
precio:55000,
descripcion:"Fit oversize premium.",
imgs:[
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png"
]
},
modelo4:{
nombre:"Modelo 4",
precio:60000,
descripcion:"Edición limitada urbana.",
imgs:[
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png",
"https://i.imgur.com/1Yc6X5h.png"
]
}
};

let cantidad=1;
let precioBase=0;

/* ===== RESET ===== */

function resetModal(){

cantidad=1;
document.getElementById("cantidad").innerText=1;

document
.querySelectorAll(".tallas button")
.forEach(b=>b.classList.remove("activa"));

document
.querySelectorAll(".tallas button")[1]
.classList.add("activa");

}

/* ===== ABRIR ===== */

function abrirModal(modelo){

resetModal();

let p=productos[modelo];

precioBase=p.precio;

document.getElementById("titulo").innerText=p.nombre;
document.getElementById("descripcion").innerText=p.descripcion;

imagenPrincipal.src=p.imgs[0];
img1.src=p.imgs[1];
img2.src=p.imgs[2];
img3.src=p.imgs[3];

actualizarPrecio();

modalProducto.style.display="flex";
}

function cerrarModal(){
modalProducto.style.display="none";
resetModal();
}

/* ===== IMAGEN ===== */
function cambiarImagen(src){
imagenPrincipal.src=src;
}

/* ===== PRECIO ===== */

function actualizarPrecio(){
precio.innerText="$"+
(precioBase*cantidad)
.toLocaleString("es-CO");
}

function sumar(){
cantidad++;
cantidad.innerText=cantidad;
document.getElementById("cantidad").innerText=cantidad;
actualizarPrecio();
}

function restar(){
if(cantidad>1){
cantidad--;
document.getElementById("cantidad").innerText=cantidad;
actualizarPrecio();
}
}

/* ALERTS */

function comprar(){
alert("Compra realizada ✅");
}

function agregar(){
alert("Producto agregado 🛒");
}

</script>

</body>
</html>
